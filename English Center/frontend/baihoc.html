<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Học Tập · English Center</title>
<link href="https://fonts.googleapis.com/css2family=DM+Sans:wght@300;400;500;600;700&family=DM+Serif+Display&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link href="assets/vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
<style>
/* ─── RESET & BASE ─── */
*{box-sizing:border-box;margin:0;padding:0;}
:root{
 --ink:#0f0f10; --ink2:#3d3d42; --ink3:#8b8b96; --ink4:#b8b8c0;
 --canvas:#ffffff; --canvas2:#f7f7f8; --canvas3:#f0f0f2;
 --line:#e8e8ec;
 --brand:#5b4cf5; --brand-d:#4338ca; --brand-l:#ede9fe;
 --green:#16a34a; --green-l:#dcfce7;
 --amber:#d97706; --amber-l:#fef3c7;
 --red:#dc2626; --red-l:#fee2e2;
 --blue:#2563eb; --blue-l:#dbeafe;
 --r:10px; --r-sm:6px; --r-lg:16px;
 --sh:0 1px 3px rgba(0,0,0,.08),0 4px 16px rgba(0,0,0,.06);
 --sh-lg:0 4px 24px rgba(0,0,0,.10),0 12px 40px rgba(0,0,0,.07);
 --font:'DM Sans',sans-serif;
}
body{font-family:var(--font);color:var(--ink);background:var(--canvas2);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;}
button,input{font-family:var(--font);}

/* ─── TOPBAR ─── */
.topbar{
 height:60px;background:var(--canvas);border-bottom:1px solid var(--line);
 display:flex;align-items:center;justify-content:space-between;
 padding:0 24px;position:sticky;top:0;z-index:300;
 box-shadow:0 1px 0 var(--line);
}
.topbar-left{display:flex;align-items:center;gap:16px;}
.back-btn{display:flex;align-items:center;gap:6px;color:var(--ink2);text-decoration:none;font-size:13.5px;font-weight:500;padding:6px 10px;border-radius:var(--r-sm);transition:.15s;}
.back-btn:hover{background:var(--canvas2);color:var(--ink);}
.divider-v{width:1px;height:20px;background:var(--line);}
.course-name{font-size:13.5px;font-weight:600;color:var(--ink2);max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.topbar-right{display:flex;align-items:center;gap:12px;}
.xp-pill{display:flex;align-items:center;gap:5px;background:var(--amber-l);color:var(--amber);border-radius:20px;padding:4px 12px;font-size:13px;font-weight:700;}
.avatar{width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid var(--line);}
.user-name{font-size:13px;font-weight:600;color:var(--ink2);}

/* ─── LAYOUT ─── */
.layout{display:flex;height:calc(100vh - 60px);}
.main{flex:1;overflow-y:auto;background:var(--canvas2);}
.sidebar{width:340px;background:var(--canvas);border-left:1px solid var(--line);overflow-y:auto;flex-shrink:0;}

/* ─── VIDEO AREA ─── */
.video-section{background:#000;aspect-ratio:16/9;position:relative;}
.video-section iframe{width:100%;height:100%;border:none;display:block;}

/* ─── CONTENT AREA ─── */
.content-area{padding:28px 32px;}

/* lesson meta */
.lesson-meta{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:24px;}
.lesson-info h1{font-family:'DM Serif Display',serif;font-size:22px;font-weight:400;color:var(--ink);line-height:1.3;margin-bottom:6px;}
.lesson-info .lesson-path{font-size:12.5px;color:var(--ink3);font-weight:500;}
.completion-tag{display:inline-flex;align-items:center;gap:6px;border-radius:20px;padding:5px 13px;font-size:12.5px;font-weight:600;white-space:nowrap;flex-shrink:0;}
.tag-locked{background:var(--red-l);color:var(--red);}
.tag-video{background:var(--amber-l);color:var(--amber);}
.tag-done{background:var(--green-l);color:var(--green);}

/* video confirm */
.confirm-strip{
 background:var(--canvas);border:1px solid var(--line);border-radius:var(--r);
 padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:14px;
 margin-bottom:24px;
}
.confirm-strip.done{border-color:#86efac;background:var(--green-l);}
.confirm-strip p{font-size:13.5px;font-weight:500;color:var(--ink2);}
.confirm-strip.done p{color:var(--green);}
.confirm-strip-btn{
 flex-shrink:0;background:var(--brand);color:#fff;border:none;border-radius:var(--r-sm);
 padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;
}
.confirm-strip-btn:hover{background:var(--brand-d);}

/* ─── TABS ─── */
.tabs-bar{display:flex;gap:2px;border-bottom:2px solid var(--line);margin-bottom:24px;overflow-x:auto;}
.tab-btn{
 flex-shrink:0;background:none;border:none;padding:10px 16px;
 font-size:13.5px;font-weight:600;color:var(--ink3);cursor:pointer;
 position:relative;transition:.15s;white-space:nowrap;
}
.tab-btn::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:var(--brand);transform:scaleX(0);transition:.2s;}
.tab-btn:hover{color:var(--ink2);}
.tab-btn.active{color:var(--brand);}
.tab-btn.active::after{transform:scaleX(1);}
.tab-panel{display:none;}
.tab-panel.active{display:block;animation:panelIn .2s ease;}
@keyframes panelIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* video-gate overlay for tabs */
.gate-box{
 background:var(--canvas);border:1px solid var(--line);border-radius:var(--r-lg);
 padding:48px 32px;text-align:center;
}
.gate-box .gate-icon{font-size:40px;margin-bottom:14px;}
.gate-box h3{font-family:'DM Serif Display',serif;font-size:20px;font-weight:400;margin-bottom:8px;}
.gate-box p{font-size:14px;color:var(--ink3);max-width:320px;margin:0 auto 18px;}
.gate-box .gate-btn{background:var(--brand);color:#fff;border:none;border-radius:var(--r-sm);padding:10px 22px;font-size:14px;font-weight:600;cursor:pointer;transition:.15s;}
.gate-box .gate-btn:hover{background:var(--brand-d);}

/* ─── THEORY ─── */
.theory-wrap{display:flex;flex-direction:column;gap:0;}
/* Section accordion-style */
.theory-section-block{background:var(--canvas);border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;margin-bottom:16px;}
.theory-sec-header{
 display:flex;align-items:center;gap:14px;padding:20px 24px;
 background:linear-gradient(135deg,var(--brand) 0%,#7c3aed 100%);
 color:#fff;
}
.theory-sec-num{
 width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.2);
 display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;
 flex-shrink:0;border:2px solid rgba(255,255,255,.35);
}
.theory-sec-title{font-size:16px;font-weight:700;letter-spacing:.2px;}
.theory-sec-body{padding:24px 24px 20px;}

/* Formula chip */
.formula-chip{
 display:flex;align-items:flex-start;gap:10px;
 background:#f8f7ff;border:1.5px solid #d8d0fe;border-radius:var(--r);
 padding:14px 18px;margin-bottom:20px;
}
.formula-chip-icon{font-size:18px;flex-shrink:0;margin-top:1px;}
.formula-chip-text{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--brand-d);line-height:1.7;white-space:pre-wrap;}

/* Rules */
.rules-list{display:flex;flex-direction:column;gap:0;margin-bottom:18px;}
.rule-row{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--canvas2);}
.rule-row:last-child{border-bottom:none;}
.rule-idx{
 width:22px;height:22px;border-radius:50%;background:var(--brand-l);
 color:var(--brand);font-size:11px;font-weight:800;
 display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;
}
.rule-body{flex:1;}
.rule-main{font-size:14px;color:var(--ink2);line-height:1.65;}
.rule-example{
 margin-top:7px;display:inline-flex;align-items:center;gap:7px;
 background:#f8f7ff;border:1px solid #d8d0fe;border-radius:6px;
 padding:5px 10px;font-family:'JetBrains Mono',monospace;font-size:12.5px;color:var(--brand-d);
}
.rule-example::before{content:'→';opacity:.5;}

/* Examples */
.examples-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--ink3);margin-bottom:9px;}
.examples-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.example-card{
 background:linear-gradient(135deg,#f0fdf4,#dcfce7);
 border:1px solid #bbf7d0;border-radius:var(--r);padding:14px 16px;
 position:relative;overflow:hidden;
}
.example-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--green);}
.example-card .en{font-size:14px;font-weight:700;color:#14532d;margin-bottom:4px;padding-left:6px;}
.example-card .vi{font-size:12.5px;color:#166534;padding-left:6px;font-style:italic;}

/* Memory note */
.memory-note{
 display:flex;align-items:flex-start;gap:10px;
 background:linear-gradient(135deg,#fffbeb,#fef3c7);
 border:1.5px solid #fde68a;border-radius:var(--r);padding:12px 16px;
}
.memory-note-icon{font-size:17px;flex-shrink:0;}
.memory-note-text{font-size:13.5px;color:#78350f;font-weight:600;line-height:1.6;}

/* CTA */
.theory-cta{
 background:var(--canvas);border:1px solid var(--line);border-radius:var(--r-lg);
 padding:22px 24px;display:flex;align-items:center;justify-content:space-between;gap:16px;
}
.theory-cta-text h4{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:3px;}
.theory-cta-text p{font-size:13px;color:var(--ink3);}
.cta-btn{background:var(--brand);color:#fff;border:none;border-radius:var(--r-sm);padding:10px 22px;font-size:14px;font-weight:700;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:7px;white-space:nowrap;}
.cta-btn:hover{background:var(--brand-d);transform:translateY(-1px);}

/* H5P */
.h5p-skeleton{background:var(--canvas2);border-radius:var(--r);overflow:hidden;position:relative;}
.h5p-skeleton::after{
 content:'';position:absolute;inset:0;
 background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.6) 50%,transparent 100%);
 animation:shimmer 1.4s infinite;
}
@keyframes shimmer{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
.h5p-tabs-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
.h5p-tab{border:1.5px solid var(--line);background:var(--canvas);border-radius:var(--r-sm);padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;color:var(--ink3);}
.h5p-tab:hover{border-color:var(--brand);color:var(--brand);}
.h5p-tab.active{background:var(--brand);border-color:var(--brand);color:#fff;}
.h5p-info{display:flex;gap:8px;align-items:flex-start;background:var(--canvas2);border-radius:var(--r-sm);padding:11px 14px;margin-bottom:14px;font-size:13px;color:var(--ink3);}
.h5p-frame-wrap{border:1px solid var(--line);border-radius:var(--r);overflow:hidden;position:relative;background:var(--canvas2);}
.h5p-loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:var(--canvas2);z-index:2;transition:opacity .3s;}
.h5p-loading.hidden{opacity:0;pointer-events:none;}
.h5p-loading-icon{font-size:32px;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.h5p-loading-text{font-size:13px;color:var(--ink3);font-weight:500;}
.h5p-frame-wrap iframe{display:block;width:100%;border:none;}

/* ─── QUIZ ─── */
.quiz-wrap{background:var(--canvas);border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;}
.quiz-topbar{padding:16px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:14px;}
.q-counter{font-size:13px;font-weight:600;color:var(--ink3);white-space:nowrap;}
.q-bar-wrap{flex:1;height:5px;background:var(--canvas3);border-radius:3px;overflow:hidden;}
.q-bar{height:100%;background:var(--brand);border-radius:3px;transition:width .4s ease;}
.q-pts{font-size:13px;font-weight:700;color:var(--amber);white-space:nowrap;}
.quiz-body{padding:28px 28px 24px;}
.q-label{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--ink3);margin-bottom:8px;}
.q-text{font-size:16.5px;font-weight:500;color:var(--ink);line-height:1.55;margin-bottom:22px;}
.options-list{display:flex;flex-direction:column;gap:9px;margin-bottom:18px;}
.opt{
 display:flex;align-items:center;gap:12px;padding:13px 16px;
 border:1.5px solid var(--line);border-radius:var(--r);background:var(--canvas);
 cursor:pointer;transition:.15s;text-align:left;width:100%;font-size:14px;color:var(--ink2);font-weight:500;
}
.opt:hover:not(:disabled){border-color:var(--brand);background:var(--brand-l);color:var(--brand);}
.opt.correct{border-color:#16a34a;background:var(--green-l);color:#15803d;}
.opt.wrong{border-color:var(--red);background:var(--red-l);color:#b91c1c;}
.opt-key{width:28px;height:28px;border-radius:6px;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;opacity:.7;}
.opt.correct .opt-key,.opt.wrong .opt-key{opacity:1;border-color:currentColor;}
.explain-strip{background:var(--canvas2);border-radius:var(--r-sm);padding:12px 14px;font-size:13.5px;color:var(--ink2);border-left:3px solid var(--brand);margin-bottom:14px;}
.explain-strip strong{color:var(--ink);}
.quiz-next{width:100%;padding:12px;background:var(--brand);color:#fff;border:none;border-radius:var(--r-sm);font-size:14px;font-weight:700;cursor:pointer;transition:.15s;}
.quiz-next:hover{background:var(--brand-d);}
/* result */
.result-box{padding:48px 28px;text-align:center;}
.result-ring{
 width:96px;height:96px;border-radius:50%;margin:0 auto 18px;
 display:flex;align-items:center;justify-content:center;font-size:36px;
 border:4px solid var(--brand);background:var(--brand-l);
}
.result-pct{font-family:'DM Serif Display',serif;font-size:36px;color:var(--brand);}
.result-label{font-size:14px;color:var(--ink3);margin:4px 0 18px;}
.result-msg{display:inline-block;border-radius:var(--r-sm);padding:10px 18px;font-size:14px;font-weight:600;margin-bottom:20px;}
.msg-pass{background:var(--green-l);color:var(--green);}
.msg-fail{background:var(--red-l);color:var(--red);}
.result-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.r-btn{border:1.5px solid var(--line);background:var(--canvas);color:var(--ink2);border-radius:var(--r-sm);padding:9px 18px;font-size:13.5px;font-weight:600;cursor:pointer;transition:.15s;}
.r-btn:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-l);}
.r-btn.primary{background:var(--brand);color:#fff;border-color:var(--brand);}
.r-btn.primary:hover{background:var(--brand-d);border-color:var(--brand-d);}

/* ─── FLASHCARD ─── */
.fc-scene{perspective:1200px;width:100%;max-width:440px;height:220px;margin:0 auto 20px;cursor:pointer;}
.fc-card{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1);}
.fc-card.flipped{transform:rotateY(180deg);}
.fc-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:var(--r-lg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;}
.fc-front{background:var(--ink);color:#fff;}
.fc-back{background:var(--green);color:#fff;transform:rotateY(180deg);}
.fc-side-label{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;opacity:.5;margin-bottom:10px;}
.fc-word{font-family:'DM Serif Display',serif;font-size:28px;font-weight:400;margin-bottom:4px;}
.fc-phonetic{font-size:13px;opacity:.6;font-family:'JetBrains Mono',monospace;}
.fc-tap{font-size:11.5px;opacity:.4;margin-top:10px;}
.fc-meaning{font-family:'DM Serif Display',serif;font-size:22px;font-weight:400;margin-bottom:8px;}
.fc-example{font-size:13px;opacity:.8;font-style:italic;}

.fc-controls{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:18px;}
.fc-control-btn{border:1.5px solid var(--line);background:var(--canvas);border-radius:var(--r-sm);padding:8px 20px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;color:var(--ink2);}
.fc-control-btn:hover{border-color:var(--ink2);}
.fc-control-btn.know{border-color:#16a34a;color:#16a34a;}
.fc-control-btn.know:hover{background:var(--green-l);}
.fc-control-btn.skip{border-color:var(--red);color:var(--red);}
.fc-control-btn.skip:hover{background:var(--red-l);}
.fc-stats-row{display:flex;gap:24px;justify-content:center;font-size:13px;color:var(--ink3);font-weight:500;}
.fc-stat span{font-weight:700;color:var(--ink);}
.fc-progress{font-size:12.5px;color:var(--ink3);text-align:center;margin-bottom:12px;}

/* ─── SPEED QUIZ (timed game) ─── */
.speedq-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.timer-ring-wrap{position:relative;width:52px;height:52px;}
.timer-ring-wrap svg{position:absolute;top:0;left:0;transform:rotate(-90deg);}
.timer-ring-wrap circle{fill:none;stroke-width:3;}
.timer-bg{stroke:var(--canvas3);}
.timer-fg{stroke:var(--brand);stroke-linecap:round;transition:stroke-dashoffset .1s linear;}
.timer-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--brand);font-family:'JetBrains Mono',monospace;}
.speedq-score-info{text-align:right;}
.speedq-score-info .big{font-size:22px;font-weight:700;color:var(--brand);font-family:'JetBrains Mono',monospace;}
.speedq-score-info .label{font-size:11.5px;color:var(--ink3);}
.speedq-question{font-size:18px;font-weight:600;color:var(--ink);text-align:center;padding:20px;background:var(--canvas2);border-radius:var(--r);margin-bottom:16px;line-height:1.5;}
.speedq-opts{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.speedq-opt{
 padding:13px;border:2px solid var(--line);border-radius:var(--r-sm);
 background:var(--canvas);font-size:14px;font-weight:600;cursor:pointer;transition:.12s;color:var(--ink2);
}
.speedq-opt:hover:not(:disabled){border-color:var(--brand);background:var(--brand-l);color:var(--brand);}
.speedq-opt.correct{border-color:#16a34a;background:var(--green-l);color:#15803d;}
.speedq-opt.wrong{border-color:var(--red);background:var(--red-l);color:#b91c1c;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}
.speedq-opt.pulse-correct{animation:pulse .3s ease;}

/* ─── SENTENCE BUILDER ─── */
.sb-instruction{font-size:13.5px;color:var(--ink3);margin-bottom:14px;font-weight:500;}
.sb-viet{font-size:15px;font-weight:600;color:var(--ink);padding:14px 16px;background:var(--canvas2);border-radius:var(--r-sm);margin-bottom:18px;}
.sb-drop-zone{
 min-height:54px;border:2px dashed var(--brand);border-radius:var(--r-sm);
 padding:10px 14px;display:flex;flex-wrap:wrap;gap:7px;align-items:center;
 margin-bottom:14px;background:var(--brand-l);cursor:default;
 transition:.2s;
}
.sb-drop-zone.correct-zone{border-color:#16a34a;background:var(--green-l);}
.sb-drop-zone.wrong-zone{border-color:var(--red);background:var(--red-l);}
.sb-placeholder{font-size:13px;color:var(--brand);opacity:.5;pointer-events:none;}
.word-chip{
 background:var(--canvas);border:1.5px solid var(--line);border-radius:6px;
 padding:6px 12px;font-size:14px;font-weight:600;color:var(--ink);
 cursor:pointer;transition:.15s;user-select:none;
}
.word-chip:hover{border-color:var(--brand);color:var(--brand);}
.word-chip.used{opacity:.3;pointer-events:none;}
.word-chip.in-zone{background:var(--brand);color:#fff;border-color:var(--brand);}
.word-chip.in-zone:hover{background:var(--brand-d);}
.sb-word-pool{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:18px;}
.sb-controls{display:flex;gap:9px;}
.sb-btn{border:1.5px solid var(--line);background:var(--canvas);color:var(--ink2);border-radius:var(--r-sm);padding:9px 18px;font-size:13.5px;font-weight:600;cursor:pointer;transition:.15s;}
.sb-btn:hover{border-color:var(--brand);color:var(--brand);}
.sb-btn.primary{background:var(--brand);color:#fff;border-color:var(--brand);}
.sb-btn.primary:hover{background:var(--brand-d);}
.sb-feedback{border-radius:var(--r-sm);padding:11px 14px;font-size:13.5px;font-weight:600;margin-bottom:12px;}
.sb-feedback.correct{background:var(--green-l);color:#166534;border-left:3px solid #16a34a;}
.sb-feedback.wrong{background:var(--red-l);color:#991b1b;border-left:3px solid var(--red);}
.sb-progress{font-size:12.5px;color:var(--ink3);margin-bottom:16px;text-align:right;}

/* ─── FILL IN BLANK ─── */
.fi-card{background:var(--canvas);border:1px solid var(--line);border-radius:var(--r-lg);padding:28px;margin-bottom:12px;}
.fi-sentence{font-size:18px;font-weight:500;color:var(--ink);line-height:2;text-align:center;margin-bottom:18px;}
.fi-blank-span{
 display:inline-block;border-bottom:2.5px solid var(--brand);
 min-width:100px;text-align:center;padding:0 8px;
 font-weight:700;color:var(--brand);font-size:17px;
}
.fi-input{
 display:block;margin:0 auto 14px;border:1.5px solid var(--line);border-radius:var(--r-sm);
 padding:10px 18px;font-size:15px;font-weight:600;text-align:center;width:100%;max-width:260px;
 transition:.15s;outline:none;color:var(--ink);
}
.fi-input:focus{border-color:var(--brand);box-shadow:0 0 0 3px var(--brand-l);}
.fi-input.correct{border-color:#16a34a;background:var(--green-l);color:#166534;}
.fi-input.wrong{border-color:var(--red);background:var(--red-l);color:#991b1b;}
.fi-chips{display:flex;flex-wrap:wrap;gap:7px;justify-content:center;margin-bottom:16px;}
.fi-chip{background:var(--canvas2);border:1.5px solid var(--line);border-radius:20px;padding:5px 14px;font-size:13.5px;font-weight:600;cursor:pointer;transition:.15s;color:var(--ink2);}
.fi-chip:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-l);}
.fi-chip.used{opacity:.3;pointer-events:none;}
.fi-check-btn{background:var(--brand);color:#fff;border:none;border-radius:var(--r-sm);padding:10px 28px;font-size:14px;font-weight:700;cursor:pointer;transition:.15s;display:block;margin:0 auto;}
.fi-check-btn:hover{background:var(--brand-d);}
.fi-feedback{border-radius:var(--r-sm);padding:10px 14px;font-size:13.5px;font-weight:600;margin-top:12px;text-align:center;}
.fi-feedback.ok{background:var(--green-l);color:#166534;}
.fi-feedback.no{background:var(--red-l);color:#991b1b;}
.fi-progress{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
.fi-prog-bar-wrap{flex:1;height:5px;background:var(--canvas3);border-radius:3px;overflow:hidden;}
.fi-prog-bar{height:100%;background:var(--brand);border-radius:3px;transition:width .4s ease;}
.fi-prog-label{font-size:12px;color:var(--ink3);font-weight:600;white-space:nowrap;}

/* ─── WORD MATCH ─── */
.match-layout{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.match-col-head{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--ink3);margin-bottom:8px;}
.match-item{
 padding:11px 14px;border:1.5px solid var(--line);border-radius:var(--r-sm);
 background:var(--canvas);font-size:13.5px;font-weight:600;color:var(--ink2);
 text-align:center;cursor:pointer;transition:.15s;
}
.match-item:hover:not(.matched){border-color:var(--brand);color:var(--brand);background:var(--brand-l);}
.match-item.selected{border-color:var(--brand);background:var(--brand);color:#fff;}
.match-item.matched{border-color:#16a34a;background:var(--green-l);color:#166534;pointer-events:none;}
.match-item.shake{animation:shake .35s ease;}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
.match-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.match-count{font-size:13px;color:var(--ink3);font-weight:500;}
.match-reset{border:1.5px solid var(--line);background:none;border-radius:var(--r-sm);padding:5px 12px;font-size:12.5px;font-weight:600;cursor:pointer;color:var(--ink3);transition:.15s;}
.match-reset:hover{border-color:var(--ink2);color:var(--ink2);}

/* ─── PDF ─── */
.pdf-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
.pdf-header h3{font-family:'DM Serif Display',serif;font-size:18px;font-weight:400;}
.pdf-dl-btn{display:inline-flex;align-items:center;gap:6px;background:var(--ink);color:#fff;border-radius:var(--r-sm);padding:8px 16px;font-size:13px;font-weight:600;text-decoration:none;transition:.15s;}
.pdf-dl-btn:hover{background:var(--ink2);}
.pdf-embed-box{border:1px solid var(--line);border-radius:var(--r);overflow:hidden;}
.pdf-embed-box object,.pdf-embed-box iframe{display:block;width:100%;border:none;}
.pdf-fallback{text-align:center;padding:48px;color:var(--ink3);}
.pdf-fallback .icon{font-size:40px;margin-bottom:12px;}
.pdf-fallback h4{font-size:16px;font-weight:600;color:var(--ink2);margin-bottom:6px;}
.pdf-fallback p{font-size:13.5px;margin-bottom:16px;}

/* ─── SIDEBAR ─── */
.sidebar-header{padding:16px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--canvas);z-index:10;}
.sidebar-header h6{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.progress-row{display:flex;align-items:center;gap:10px;}
.course-prog-bar-wrap{flex:1;height:5px;background:var(--canvas3);border-radius:3px;overflow:hidden;}
.course-prog-bar{height:100%;background:var(--brand);border-radius:3px;transition:width .5s ease;}
.prog-pct{font-size:11.5px;font-weight:700;color:var(--ink3);white-space:nowrap;}
.chapter-head{padding:10px 18px 8px;font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--ink3);background:var(--canvas2);border-top:1px solid var(--line);}
.sidebar-lesson{display:flex;align-items:flex-start;gap:10px;padding:11px 18px;cursor:pointer;transition:.15s;border-bottom:1px solid var(--canvas2);position:relative;}
.sidebar-lesson:not(.locked):hover{background:var(--canvas2);}
.sidebar-lesson.active{background:var(--brand-l);}
.sidebar-lesson.locked{cursor:not-allowed;opacity:.5;}
.sl-icon{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:1px;}
.sl-icon.done{background:var(--green-l);color:var(--green);}
.sl-icon.active-icon{background:var(--brand-l);color:var(--brand);}
.sl-icon.locked-icon{background:var(--canvas2);color:var(--ink4);}
.sl-icon.idle{background:var(--canvas2);color:var(--ink3);}
.sl-info{flex:1;min-width:0;}
.sl-name{font-size:13px;font-weight:600;color:var(--ink2);line-height:1.4;}
.sidebar-lesson.active .sl-name{color:var(--brand);}
.sl-meta{font-size:11.5px;color:var(--ink3);margin-top:2px;}

/* ─── GAME SECTION WRAPPERS ─── */
.game-section-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;gap:12px;}
.game-section-header h2{font-family:'DM Serif Display',serif;font-size:20px;font-weight:400;color:var(--ink);}
.game-section-header p{font-size:13px;color:var(--ink3);margin-top:3px;}
.game-outer{background:var(--canvas);border:1px solid var(--line);border-radius:var(--r-lg);padding:24px 26px;}

/* ─── TOAST ─── */
.toast-xp{
 position:fixed;top:72px;right:20px;z-index:9999;
 background:var(--ink);color:#fff;border-radius:var(--r-sm);
 padding:10px 16px;font-size:13.5px;font-weight:600;
 box-shadow:var(--sh-lg);display:none;
 animation:toastSlide .3s ease;
}
@keyframes toastSlide{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ─── UNLOCK BANNER ─── */
.unlock-banner{background:var(--green-l);border:1px solid #86efac;border-radius:var(--r);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:14px;margin-top:16px;}
.unlock-banner p{font-size:13.5px;font-weight:600;color:#166534;}
.unlock-banner button{background:#16a34a;color:#fff;border:none;border-radius:var(--r-sm);padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;transition:.15s;}
.unlock-banner button:hover{background:#15803d;}
.fail-banner{background:var(--red-l);border:1px solid #fca5a5;border-radius:var(--r);padding:14px 18px;margin-top:16px;}
.fail-banner p{font-size:13.5px;font-weight:600;color:#991b1b;}

/* ─── H5P ─── */
.h5p-type-tabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;}
.h5p-type-btn{
 border:1.5px solid var(--line);background:var(--canvas);border-radius:var(--r-sm);
 padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;transition:.15s;color:var(--ink3);
}
.h5p-type-btn:hover{border-color:var(--brand);color:var(--brand);}
.h5p-type-btn.active{background:var(--brand);border-color:var(--brand);color:#fff;font-weight:700;}
.h5p-info-bar{
 display:flex;align-items:flex-start;gap:8px;background:var(--canvas2);
 border-radius:var(--r-sm);padding:11px 14px;margin-bottom:14px;
 font-size:13px;color:var(--ink3);border:1px solid var(--line);
}
.h5p-frame-wrap{
 border:1px solid var(--line);border-radius:var(--r);overflow:hidden;
 position:relative;background:var(--canvas2);
}
.h5p-skeleton{
 position:absolute;inset:0;display:flex;flex-direction:column;
 align-items:center;justify-content:center;gap:12px;
 background:var(--canvas2);z-index:2;transition:opacity .4s;
}
.h5p-skeleton.hidden{opacity:0;pointer-events:none;}
.h5p-skeleton-icon{font-size:30px;animation:h5pSpin 1.2s linear infinite;}
@keyframes h5pSpin{to{transform:rotate(360deg)}}
.h5p-skeleton-text{font-size:13px;color:var(--ink3);font-weight:500;}
.h5p-skeleton-bar{
 width:120px;height:4px;background:var(--line);border-radius:2px;overflow:hidden;
}
.h5p-skeleton-bar::after{
 content:'';display:block;height:100%;width:40%;background:var(--brand);
 border-radius:2px;animation:h5pBar 1.2s ease-in-out infinite;
}
@keyframes h5pBar{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}
.h5p-frame-wrap iframe{display:block;width:100%;border:none;}
.h5p-error{
 background:var(--canvas2);border:1px solid var(--line);border-radius:var(--r-sm);
 padding:14px 16px;display:flex;align-items:center;justify-content:space-between;
 gap:12px;margin-top:12px;
}
.h5p-error span{font-size:13px;color:var(--ink3);}
.h5p-open-btn{
 flex-shrink:0;background:var(--brand);color:#fff;border-radius:var(--r-sm);
 padding:7px 14px;text-decoration:none;font-size:13px;font-weight:600;
 transition:.15s;white-space:nowrap;
}
.h5p-open-btn:hover{background:var(--brand-d);}
@media(max-width:600px){.speedq-opts{grid-template-columns:1fr;} .match-layout{grid-template-columns:1fr;} .fi-sentence{font-size:15px;}}

/* ─── HOTSPOT ─── */
.hotspot-wrap{position:relative;width:100%;border-radius:var(--r-lg);overflow:hidden;background:var(--canvas);border:1px solid var(--line);user-select:none;}
.hotspot-svg-area{display:block;width:100%;height:auto;}
.hotspot-point{position:absolute;transform:translate(-50%,-50%);width:36px;height:36px;cursor:pointer;z-index:10;}
.hotspot-pulse{
 width:36px;height:36px;border-radius:50%;
 background:rgba(91,76,245,.92);border:3px solid #fff;
 box-shadow:0 2px 12px rgba(91,76,245,.5);
 display:flex;align-items:center;justify-content:center;
 font-size:13px;font-weight:800;color:#fff;
 transition:transform .15s,box-shadow .15s;position:relative;
}
.hotspot-pulse::after{content:'';position:absolute;inset:-7px;border-radius:50%;border:2px solid rgba(91,76,245,.35);animation:hsPulse 2s ease-out infinite;}
@keyframes hsPulse{0%{transform:scale(1);opacity:.8}100%{transform:scale(1.9);opacity:0}}
.hotspot-point:hover .hotspot-pulse{transform:scale(1.18);box-shadow:0 4px 20px rgba(91,76,245,.6);}
.hotspot-point.visited .hotspot-pulse{background:var(--green);box-shadow:0 4px 16px rgba(22,163,74,.45);}
.hotspot-point.visited .hotspot-pulse::after{border-color:rgba(22,163,74,.35);}

.hotspot-popup{
 position:absolute;z-index:20;width:230px;
 background:#fff;border-radius:var(--r);border:1px solid var(--line);
 box-shadow:var(--sh-lg);padding:14px 16px;
 animation:popIn .2s cubic-bezier(.34,1.56,.64,1);
}
@keyframes popIn{from{opacity:0;transform:scale(.85) translateY(6px)}to{opacity:1;transform:scale(1) translateY(0)}}
.hs-close{position:absolute;top:8px;right:10px;background:none;border:none;cursor:pointer;color:var(--ink3);font-size:16px;line-height:1;padding:2px 4px;}
.hs-close:hover{color:var(--ink);}
.hotspot-popup-tag{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--brand);margin-bottom:5px;}
.hotspot-popup-title{font-size:14.5px;font-weight:800;color:var(--ink);margin-bottom:7px;padding-right:16px;}
.hotspot-popup-body{font-size:13px;color:var(--ink2);line-height:1.65;}
.hotspot-popup-ex{margin-top:9px;background:#f8f7ff;border-radius:6px;padding:8px 10px;border-left:3px solid var(--brand);}
.hotspot-popup-ex .ex-en{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--brand-d);font-weight:600;}
.hotspot-popup-ex .ex-vi{font-size:11.5px;color:var(--ink3);margin-top:3px;font-style:italic;}
.hs-counter{font-size:13px;color:var(--ink3);font-weight:500;margin-bottom:14px;}
.hs-counter strong{color:var(--brand);font-size:15px;}
.hs-done-banner{background:var(--green-l);border:1px solid #86efac;border-radius:var(--r);padding:12px 16px;margin-top:14px;font-size:13.5px;color:#166534;font-weight:600;text-align:center;}
</style>
</head>

 ],

let CID='nguphap', CHP=0, LES=0, lesson=null;
let XP = +localStorage.getItem('ec_xp')||0;
let LST = JSON.parse(localStorage.getItem('ec_lst')||'{}'); // lesson state

// quiz
let qIdx=0,qScore=0,qDone=false;
// speed quiz
let sqIdx=0,sqScore=0,sqTimer=null,sqTimeLeft=12,sqTot=0;
// flashcard
let fcIdx=0,fcKnow=0,fcSkip=0;
// fill-in
let fiIdx=0,fiScore=0;
// builder
let sbIdx=0,sbScore=0,sbBuilt=[],sbPool=[];
// match
let mSel=null,mType=null,mMatched=0,mPairs=[];

const lk = (ci,ch,li) => `${ci}-${ch}-${li}`;
const lst = k => LST[k]||{video:false,quiz:false,best:0};
const save = (k,d) => { LST[k]=d; localStorage.setItem('ec_lst',JSON.stringify(LST)); };

function prevLesson(ci,ch,li){ let pc=ch,pl=li-1; if(pl<0){pc--;if(pc<0)return null;pl=COURSES[ci].chapters[pc].lessons.length-1;} return {ch:pc,li:pl}; }

function unlocked(ci,ch,li){
 if(ch===0&&li===0) return true;
 const prev=prevLesson(ci,ch,li);
 if(!prev) return true;
 const s=lst(lk(ci,prev.ch,prev.li));
 return s.video && s.quiz;
}
function completed(ci,ch,li){ const s=lst(lk(ci,ch,li)); return s.video&&s.quiz; }

 XP
═══════════════════════════════════════════════ */
function giveXP(n,label=''){
 XP+=n; localStorage.setItem('ec_xp',XP);
 document.getElementById('totalXP').textContent=XP;
 const t=document.getElementById('xpToast');
 t.textContent=`⭐ +${n} XP${label' · '+label:''}`;
 t.style.cssText='display:block;animation:none;';
 requestAnimationFrame(()=>{ t.style.animation='toastSlide .3s ease'; });
 clearTimeout(t._tid);
 t._tid=setTimeout(()=>{ t.style.cssText='display:none;'; },2200);
}

function confirmVideo(){

 if(!s.video){ s.video=true; save(k,s); giveXP(15,'Video'); }

function switchTab(id,btn){
 const k=lk(CID,CHP,LES), s=lst(k);
 const needVideo=['quiz','speedquiz','flashcard','fillin','builder','match'];

 document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
 document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
 document.getElementById('panel-'+id).classList.add('active');
 btn.classList.add('active');

 // Nếu chưa xem video → hiện gate, không render nội dung

 <div class="gate-box">
 <div class="gate-icon"></div>
 <h3>Xem video trước đã nhé</h3>

 <button class="gate-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})">Lên đầu trang</button>
 </div>`;
 return;
 }

 // Luôn re-render để đảm bảo đúng nội dung bài hiện tại
 if(id==='theory') renderTheory();
 else if(id==='quiz') renderQuiz();
 else if(id==='speedquiz') renderSpeedQuiz();
 else if(id==='flashcard') renderFlashcard();
 else if(id==='fillin') renderFillin();
 else if(id==='builder') renderBuilder();
 else if(id==='match') renderMatch();
 else if(id==='hotspot') renderHotspot();
 else if(id==='h5p') renderH5P();
 else if(id==='pdf') renderPdf();
}

function changeLesson(ci,ch,li){
 if(!unlocked(ci,ch,li)){ showLockModal(); return; }
 if(sqTimer){ clearInterval(sqTimer); sqTimer=null; }

 CID=ci; CHP=ch; LES=li; hsSeen=new Set(); h5pActive=0;
 lesson=COURSES[ci].chapters[ch].lessons[li];

 document.getElementById('mainVideo').src=`https://www.youtube.com/embed/${lesson.vid}rel=0`;
 document.getElementById('lessonTitle').textContent=lesson.name;
 document.getElementById('lessonPath').textContent=COURSES[ci].chapters[ch].title+' › '+lesson.name;

 const k=lk(ci,ch,li), s=lst(k);
 const strip=document.getElementById('confirmStrip');
 const btn=document.getElementById('confirmBtn');
 if(s.video){
 strip.classList.add('done');
 document.getElementById('confirmMsg').textContent=' Video đã hoàn thành.';
 btn.style.display='none';
 } else {
 strip.classList.remove('done');
 document.getElementById('confirmMsg').textContent=' Xem hết video rồi xác nhận để mở bài tập.';
 btn.style.display='';
 }
 updateBadge();

 // Reset tất cả game state về 0
 qIdx=0; qScore=0; qDone=false;
 sqIdx=0; sqScore=0; if(sqTimer){clearInterval(sqTimer);sqTimer=null;}
 fcIdx=0; fcKnow=0; fcSkip=0;
 fiIdx=0; fiScore=0;
 sbIdx=0; sbScore=0; sbBuilt=[]; sbPool=[];
 mSel=null; mType=null; mMatched=0;

 // Clear tất cả panels — force re-render khi click tab
 document.querySelectorAll('.tab-panel').forEach(p=>{ p.classList.remove('active'); p.innerHTML=''; });
 document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
 document.getElementById('panel-theory').classList.add('active');
 document.querySelectorAll('.tab-btn')[0].classList.add('active');
 renderTheory();

 updateSidebar(); updateCourseProgress();
 window.scrollTo({top:0,behavior:'smooth'});
}

function renderQuiz(){ qIdx=0;qScore=0;qDone=false; renderQQ(); }
function renderQQ(){
 const el=document.getElementById('panel-quiz'), qs=lesson.quiz;
 if(!qs.length){ el.innerHTML=`<div class="quiz-wrap"><div class="quiz-body"><p style="color:#8b8b96">Câu hỏi đang cập nhật...</p></div></div>`; return; }
 if(qIdx>=qs.length){ renderQResult(qs.length); return; }
 const q=qs[qIdx], pct=(qIdx/qs.length)*100, L=['A','B','C','D'];
 el.innerHTML=`<div class="quiz-wrap">
 <div class="quiz-topbar">
 <div class="q-counter">${qIdx+1} / ${qs.length}</div>
 <div class="q-bar-wrap"><div class="q-bar" style="width:${pct}%"></div></div>
 <div class="q-pts">${qScore*10} điểm</div>
 </div>
 <div class="quiz-body">

 <div id="qexp" style="min-height:44px;"></div>
 </div>
 </div>`;
}
function checkQ(i){
 if(qDone)return; qDone=true;
 const q=lesson.quiz[qIdx];
 const correct=i===q.ans;
 document.querySelectorAll('.opt').forEach(b=>b.disabled=true);
 document.getElementById('qo'+i).classList.add(correct'correct':'wrong');
 if(!correct) document.getElementById('qo'+q.ans).classList.add('correct');

 if(correct){ qScore++; giveXP(10,'Đúng '); }
 else { takeXP(5,'Sai x'); }

 const color=correct'var(--green)':'var(--red)';
 const icon=correct'':'';
 document.getElementById('qexp').innerHTML=`
 <div class="explain-strip" style="border-left-color:${color}">
 ${icon} <strong>Giải thích:</strong> ${q.exp}
 </div>`;

 // auto advance sau 1.8s
 setTimeout(()=>{ qIdx++; qDone=false; renderQQ(); }, 1800);
}
function takeXP(n,label=''){
 XP=Math.max(0,XP-n); localStorage.setItem('ec_xp',XP);
 document.getElementById('totalXP').textContent=XP;
 const t=document.getElementById('xpToast');
 t.textContent=` −${n} XP${label' · '+label:''}`;
 t.style.cssText='display:block;background:#dc2626;color:#fff;animation:none;';
 requestAnimationFrame(()=>{ t.style.animation='toastSlide .3s ease'; });
 clearTimeout(t._tid);
 t._tid=setTimeout(()=>{ t.style.cssText='display:none;'; },2000);
}
function renderQResult(tot){
 const el=document.getElementById('panel-quiz');
 const pct=Math.round(qScore/tot*100), pass=pct>=60;
 const k=lk(CID,CHP,LES), s=lst(k);
 if(pct>(s.best||0)) s.best=pct;
 if(pass&&!s.quiz){ s.quiz=true; giveXP(50,'Hoàn thành bài'); }
 save(k,s); updateBadge(); updateSidebar(); updateCourseProgress();

 const emoji=pct>=80'':pct>=60'':'';
 const msg=pct>=80'Xuất sắc!':pct>=60'Đạt yêu cầu!':'Chưa đủ — cố lên!';

 // next lesson
 let nextEl='';
 if(pass){
 const course=COURSES[CID]; let nc=CHP,nl=LES+1;
 if(nl>=course.chapters[nc].lessons.length){nc++;nl=0;}
 if(nc<course.chapters.length){
 nextEl=`<div class="unlock-banner"><p> Bài tiếp theo đã được mở khoá!</p><button onclick="changeLesson('${CID}',${nc},${nl})">Học tiếp →</button></div>`;
 } else {
 nextEl=`<div class="unlock-banner"><p> Bạn đã hoàn thành toàn bộ khoá học!</p></div>`;
 }
 } else {
 nextEl=`<div class="fail-banner"><p>Cần đạt ≥60% để mở bài tiếp. Điểm của bạn: <strong>${pct}%</strong></p></div>`;
 }

 el.innerHTML=`<div class="quiz-wrap"><div class="result-box">
 <div class="result-ring">${emoji}</div>
 <div class="result-pct">${pct}%</div>
 <div class="result-label">${qScore}/${tot} câu đúng</div>
 <div class="result-msg ${pass'msg-pass':'msg-fail'}">${msg}</div>
 ${nextEl}
 <div class="result-actions" style="margin-top:16px;">
 <button class="r-btn" onclick="renderQuiz()"> Làm lại</button>
 <button class="r-btn primary" onclick="document.querySelectorAll('.tab-btn')[2].click()"> Thi đua nào</button>
 <button class="r-btn" onclick="document.querySelectorAll('.tab-btn')[3].click()">🃏 Flashcard</button>
 </div>
 </div></div>`;
}

/* ═══════════════════════════════════════════════
 SPEED QUIZ (timed — 10s/câu)
═══════════════════════════════════════════════ */
function renderSpeedQuiz(){
 sqIdx=0; sqScore=0;
 const qs=lesson.quiz;
 if(!qs.length){ document.getElementById('panel-speedquiz').innerHTML=`<div class="game-outer"><p style="color:#8b8b96">Câu hỏi đang cập nhật...</p></div>`; return; }
 sqTot=qs.length;
 renderSQ();
}
const SQ_TIME=12;
function renderSQ(){
 const el=document.getElementById('panel-speedquiz'), qs=lesson.quiz;
 if(sqIdx>=qs.length){ renderSQResult(); return; }
 if(sqTimer) clearInterval(sqTimer);
 sqTimeLeft=SQ_TIME;

 const q=qs[sqIdx], CIRC=2*Math.PI*22; // r=22 → c=138.2
 el.innerHTML=`
 <div class="game-section-header">
 <div><h2> Thi đua trả lời nhanh</h2><p>Mỗi câu ${SQ_TIME} giây — trả lời sớm được thưởng thêm điểm!</p></div>
 <div class="speedq-score-info"><div class="big" id="sq-sc">${sqScore}</div><div class="label">điểm</div></div>
 </div>
 <div class="game-outer">
 <div class="speedq-header">
 <div>
 <div style="font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#8b8b96;margin-bottom:4px;">Câu ${sqIdx+1} / ${qs.length}</div>
 <div style="font-size:13px;color:#3d3d42;font-weight:500;">Trả lời sớm nhất = điểm cao nhất</div>
 </div>
 <div class="timer-ring-wrap">
 <svg width="52" height="52" viewBox="0 0 52 52">
 <circle class="timer-bg" cx="26" cy="26" r="22" stroke-dasharray="${CIRC}" stroke-dashoffset="0"/>
 <circle class="timer-fg" id="sq-ring" cx="26" cy="26" r="22" stroke-dasharray="${CIRC}" stroke-dashoffset="0"/>
 </svg>
 <div class="timer-num" id="sq-time">${SQ_TIME}</div>
 </div>
 </div>
 <div class="speedq-question">${q.q}</div>
 <div class="speedq-opts">${q.opts.map((o,i)=>`<button class="speedq-opt" onclick="checkSQ(${i})" id="sqo${i}">${o}</button>`).join('')}</div>
 <div id="sq-fb" style="margin-top:12px;"></div>
 </div>`;

 sqTimer=setInterval(()=>{
 sqTimeLeft--;
 const pct=sqTimeLeft/SQ_TIME;
 const ring=document.getElementById('sq-ring');
 const timeEl=document.getElementById('sq-time');
 if(!ring||!timeEl){clearInterval(sqTimer);return;}
 ring.style.strokeDashoffset=CIRC*(1-pct);
 ring.style.stroke=sqTimeLeft<=4'#dc2626':sqTimeLeft<=7'#d97706':'#5b4cf5';
 timeEl.style.color=sqTimeLeft<=4'#dc2626':sqTimeLeft<=7'#d97706':'#5b4cf5';
 timeEl.textContent=sqTimeLeft;
 if(sqTimeLeft<=0){ clearInterval(sqTimer); autoSQ(); }
 },1000);
}
function checkSQ(i){
 if(!document.getElementById('sqo0')) return;
 clearInterval(sqTimer);
 const q=lesson.quiz[sqIdx];
 document.querySelectorAll('.speedq-opt').forEach(b=>b.disabled=true);
 if(i===q.ans){
 document.getElementById('sqo'+i).classList.add('correct');
 const bonus=Math.ceil(sqTimeLeft/SQ_TIME*10);
 sqScore+=10+bonus;
 document.getElementById('sq-sc').textContent=sqScore;
 document.getElementById('sq-fb').innerHTML=`<div class="sb-feedback correct"> Đúng! +${10+bonus} điểm (thưởng nhanh: +${bonus})</div>`;
 giveXP(5+bonus,'Speed');
 } else {
 document.getElementById('sqo'+i).classList.add('wrong');
 document.getElementById('sqo'+q.ans).classList.add('correct');
 document.getElementById('sq-fb').innerHTML=`<div class="sb-feedback wrong"> Sai! Đáp án đúng đã được đánh dấu.</div>`;
 }
 setTimeout(()=>{ sqIdx++; renderSQ(); },1500);
}
function autoSQ(){

function addWord(i,w){
 const btn=document.getElementById('wp'+i);
 if(btn.classList.contains('used')) return;
 btn.classList.add('used');
 sbBuilt.push({i,w});
 updateZone();
}
function updateZone(){
 const zone=document.getElementById('sb-zone'), ph=document.getElementById('sb-ph');
 if(ph) ph.style.display=sbBuilt.length'none':'';
 // remove old chips in zone (keep placeholder)
 zone.querySelectorAll('.word-chip').forEach(c=>c.remove());
 sbBuilt.forEach((item,bi)=>{
 const chip=document.createElement('button');
 chip.className='word-chip in-zone';
 chip.textContent=item.w;
 chip.onclick=()=>removeWord(bi);
 zone.appendChild(chip);
 });
}
function removeWord(bi){
 const item=sbBuilt.splice(bi,1)[0];
 document.getElementById('wp'+item.i).classList.remove('used');
 updateZone();
}
function clearSB(){
 sbBuilt=[];
 document.querySelectorAll('.word-chip.used').forEach(c=>c.classList.remove('used'));
 updateZone();
 document.getElementById('sb-fb').innerHTML='';
 document.getElementById('sb-zone').classList.remove('correct-zone','wrong-zone');
}
function checkSB(){
 const q=lesson.builder[sbIdx];
 const built=sbBuilt.map(x=>x.w).join(' ');
 const correct=q.answer;
 const ok=built.replace(/\s+/g,' ').trim().toLowerCase()===correct.replace(/\s+/g,' ').trim().toLowerCase();
 const zone=document.getElementById('sb-zone');
 zone.classList.remove('correct-zone','wrong-zone');
 zone.classList.add(ok'correct-zone':'wrong-zone');
 if(ok){
 document.getElementById('sb-fb').innerHTML=`<div class="sb-feedback correct" style="margin-bottom:10px;"> Chính xác!</div>`;
 sbScore++; giveXP(10,'Xây câu');
 } else {
 document.getElementById('sb-fb').innerHTML=`<div class="sb-feedback wrong" style="margin-bottom:10px;"> Chưa đúng. Đáp án: <em>${correct}</em></div>`;
 }
 setTimeout(()=>{ sbIdx++; renderSB(); },1800);
}

function renderMatch(){
 const el=document.getElementById('panel-match'), pairs=lesson.matching;
 if(!pairs.length){ el.innerHTML=`<div class="game-outer"><p style="color:#8b8b96">Đang cập nhật...</p></div>`; return; }
 mSel=null; mType=null; mMatched=0;
 mPairs=[...pairs].slice(0,6);
 const ws=mPairs.map((p,i)=>({id:i,t:p.word})).sort(()=>Math.random()-.5);
 const ms=mPairs.map((p,i)=>({id:i,t:p.meaning})).sort(()=>Math.random()-.5);
 el.innerHTML=`
 <div class="game-section-header"><div><h2> Nối từ với nghĩa</h2><p>Nhấn một từ rồi nhấn nghĩa tương ứng</p></div></div>

 <div class="match-count">Đã nối: <strong id="mc">0</strong> / ${mPairs.length}</div>
 <button class="match-reset" onclick="renderMatch()">↺ Trộn lại</button>
 </div>
 <div class="match-layout">
 <div>
 <div class="match-col-head">Từ / Cấu trúc</div>
 ${ws.map(w=>`<div class="match-item" id="w${w.id}" onclick="matchCk(${w.id},'w')">${w.t}</div>`).join('')}
 </div>
 <div>
 <div class="match-col-head">Nghĩa tiếng Việt</div>
 ${ms.map(m=>`<div class="match-item" id="m${m.id}" onclick="matchCk(${m.id},'m')">${m.t}</div>`).join('')}
 </div>
 </div>
 <div id="mfb" style="margin-top:14px;"></div>
 </div>`;
}
function matchCk(id,type){
 const el=document.getElementById(`${type}${id}`);
 if(el.classList.contains('matched')) return;
 if(mSel===null){ mSel=id;mType=type; document.querySelectorAll('.match-item').forEach(i=>i.classList.remove('selected')); el.classList.add('selected'); return; }
 if(mType===type){ document.querySelectorAll('.match-item').forEach(i=>i.classList.remove('selected')); mSel=id;mType=type; el.classList.add('selected'); return; }
 const wid=type==='m'mSel:id, mid=type==='m'id:mSel;
 if(wid===mid){
 [`w${wid}`,`m${mid}`].forEach(s=>{ const n=document.getElementById(s); n.classList.remove('selected'); n.classList.add('matched'); });
 mMatched++; document.getElementById('mc').textContent=mMatched; giveXP(8,'Nối từ');
 if(mMatched>=mPairs.length) setTimeout(()=>{ document.getElementById('mfb').innerHTML=`<div class="sb-feedback correct"> Ghép đúng tất cả! Xuất sắc! <button class="r-btn" style="margin-left:10px;" onclick="renderMatch()">Chơi lại</button></div>`; giveXP(20,'Hoàn thành Match'); },200);
 } else {
 [document.getElementById(`${type}${id}`),document.getElementById(`${mType}${mSel}`)].forEach(n=>{ n.classList.remove('selected'); n.classList.add('shake'); setTimeout(()=>n.classList.remove('shake'),400); });
 }
 mSel=null; mType=null;
}

 ${hs.points.map((p,i)=>`

function showHsPopup(i){
 const hs = lesson.hotspot;
 const p = hs.points[i];
 const wrap = document.getElementById('hs-wrap');

 // remove old popup
 wrap.querySelectorAll('.hotspot-popup').forEach(x=>x.remove());

 // mark visited
 document.getElementById('hsp-'+i).classList.add('visited');
 hsSeen.add(i);
 document.getElementById('hs-seen').textContent = hsSeen.size;

 if(hsSeen.size === hs.points.length){
 document.getElementById('hs-done').style.display='block';
 giveXP(20,'Sơ đồ');
 }

 // build popup
 const popup = document.createElement('div');
 popup.className = 'hotspot-popup';
 // position: default below, flip if near bottom
 const posY = p.y > 65  'bottom' : 'top';
 const posX = p.x > 75  'right-edge' : p.x < 25  'left-edge' : 'center';

 let left = p.x + '%', transform = 'translateX(-50%)';
 let top = '', bottom = '';
 if(posY === 'top') top = (p.y + 4) + '%';
 else bottom = (100 - p.y + 4) + '%';
 if(posX === 'right-edge'){ left = 'auto'; transform = 'none'; popup.style.right = (100 - p.x + 2) + '%'; }
 else if(posX === 'left-edge'){ transform = 'none'; }

 popup.style.cssText = `left:${left};${top'top:'+top:''};${bottom'bottom:'+bottom:''};transform:${transform};`;
 popup.innerHTML = `
 <button class="hs-close" onclick="this.closest('.hotspot-popup').remove()">x</button>
 <div class="hotspot-popup-tag">${p.tag}</div>
 <div class="hotspot-popup-title">${p.label}</div>
 <div class="hotspot-popup-body">${p.body}</div>
 ${p.ex  `<div class="hotspot-popup-ex">
 <div class="ex-en">${p.ex.en}</div>
 <div class="ex-vi">${p.ex.vi}</div>
 </div>` : ''}`;
 wrap.appendChild(popup);

 // close when clicking outside
 setTimeout(()=>{
 const handler = (e)=>{
 if(!popup.contains(e.target) && !document.getElementById('hsp-'+i).contains(e.target)){
 popup.remove(); document.removeEventListener('click', handler);
 }
 };
 document.addEventListener('click', handler);
 }, 50);
}

 </div>`;
 } else {

 </div>`;
 }
}

 <button onclick="location.href=location.pathname+'id=${firstId}'" style="background:#5b4cf5;color:#fff;border:none;border-radius:8px;padding:11px 22px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;">Xem khoá có sẵn</button>

}
