services:

  db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-ec_password}
      MYSQL_DATABASE: ${DB_NAME:-english_center}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root",
             "--password=${DB_PASSWORD:-ec_password}"]
      interval: 5s
      timeout: 5s
      retries: 15

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # DB: trỏ vào service "db" thay vì localhost
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-ec_password}
      DB_NAME: ${DB_NAME:-english_center}
      PORT: 3000
      # AI – lấy từ .env hoặc đặt trực tiếp ở đây
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      AI_API_URL: ${AI_API_URL:-https://api.openai.com/v1/chat/completions}
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
